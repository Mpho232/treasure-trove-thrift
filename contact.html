<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Treasure Trove Thrift Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/mixins/_banner.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Custom Brand Colors for Treasure Trove */
        :root {
            --primary-teal: #1a4d4a;     /* Deep Vintage Teal */
            --secondary-amber: #d49a3b;  /* Warm Gold/Amber accent */
            --light-cream: #f9f8f3;      /* Soft background */
            --dark-charcoal: #2b2b2b;    /* Readable text */
            --whatsapp-green: #25D366;   /* Official WhatsApp Green */
        }

        body {
            background-color: var(--light-cream);
            color: var(--dark-charcoal);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .navbar-brand, .footer-bg {
            background-color: var(--primary-teal) !important;
        }

        .card-custom {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            background-color: #ffffff;
        }

        .form-control:focus {
            border-color: var(--secondary-amber);
            box-shadow: 0 0 0 0.25rem rgba(212, 154, 59, 0.25);
        }

        /* Submit Button Style */
        .btn-whatsapp {
            background-color: var(--whatsapp-green);
            color: white;
            font-weight: 600;
            border: none;
            transition: all 0.3s ease;
        }

        .btn-whatsapp:hover {
            background-color: #1ebd56;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3);
        }

        .accent-text {
            color: var(--secondary-amber);
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-brand sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">Treasure Trove Store</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
                    <li class="nav-item"><a class="nav-link" href="catalog.html">Catalog</a></li>
                    <li class="nav-item"><a class="nav-link" href="customer_review.html">Customer Review</a></li>
                    <li class="nav-item"><a class="nav-link active fw-semibold" href="contact.html">Contact Us</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card card-custom p-4 p-md-5">
                    <h2 class="text-center fw-bold mb-2">Send Us Feedback</h2>
                    <p class="text-center text-muted mb-4">Fill out the form below to chat directly with us on WhatsApp!</p>
                    
                    <form id="whatsappForm">
                        <div class="mb-3">
                            <label for="userName" class="form-label fw-semibold">Your Name</label>
                            <input type="text" class="form-control form-control-lg" id="userName" placeholder="John Doe" required>
                        </div>

                        <div class="mb-3">
                            <label for="msgSubject" class="form-label fw-semibold">Subject / Item Inquiry</label>
                            <input type="text" class="form-control form-control-lg" id="msgSubject" placeholder="e.g., Denim Jacket Availability" required>
                        </div>

                        <div class="mb-4">
                            <label for="userMessage" class="form-label fw-semibold">Your Feedback / Message</label>
                            <textarea class="form-control" id="userMessage" rows="4" placeholder="Type your feedback details here..." required></textarea>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-whatsapp btn-lg py-3">
                                <i class="fa-brands fa-whatsapp me-2"></i>Submit via WhatsApp
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer-bg text-white text-center py-3 mt-auto">
        <div class="container">
            <p class="mb-0">&copy; 2026 Treasure Trove Thrift Store. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.getElementById('whatsappForm').addEventListener('submit', function(event) {
            event.preventDefault(); // Prevents the page from refreshing

            // 1. Enter your real business phone number here (include country code, remove spaces or plus signs)
            const phoneNumber = "26771234567"; 

            // 2. Extract values from the form fields
            const name = document.getElementById('userName').value.trim();
            const subject = document.getElementById('msgSubject').value.trim();
            const feedback = document.getElementById('userMessage').value.trim();

            // 3. Construct a neat, clean message layout for WhatsApp
            const textMessage = `Hello Treasure Trove!%0A%0A` +
                                `*Name:* ${encodeURIComponent(name)}%0A` +
                                `*Subject:* ${encodeURIComponent(subject)}%0A` +
                                `*Feedback:* ${encodeURIComponent(feedback)}`;

            // 4. Generate the universal WhatsApp API URL
            const whatsappUrl = `https://wa.me/${26773214110}?text=${textMessage}`;

            // 5. Instantly redirect the customer's browser tab to WhatsApp
            window.location.href = whatsappUrl;
        });
    </script>
</body>
</html>

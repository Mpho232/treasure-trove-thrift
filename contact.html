<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Treasure Trove Thrift Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Consistent Black & White Theme */
        :root {
            --primary-black: #000000;
            --dark-gray: #212529;
            --light-bg: #ffffff;
            --border-color: #dee2e6;
            --whatsapp-green: #25D366;
        }

        html, body {
            height: 100%;
        }

        body {
            display: flex;
            flex-direction: column;
            background-color: var(--light-bg);
            color: var(--primary-black);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Black Navigation Bar & Footer */
        .navbar, .footer-bg {
            background-color: var(--primary-black) !important;
        }

        .card-custom {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: #ffffff;
        }

        /* Standard black focus border for form inputs */
        .form-control:focus {
            border-color: var(--primary-black);
            box-shadow: 0 0 0 0.25rem rgba(0, 0, 0, 0.1);
        }

        /* WhatsApp Button Style */
        .btn-whatsapp {
            background-color: var(--whatsapp-green);
            color: white;
            font-weight: 600;
            border: none;
            transition: all 0.3s ease;
        }

        .btn-whatsapp:hover {
            background-color: #1ebd56;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3);
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">Treasure Trove Store</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
                    <li class="nav-item"><a class="nav-link" href="catalog.html">Catalog</a></li>
                    <li class="nav-item"><a class="nav-link" href="customer_review.html">Customer Review</a></li>
                    <li class="nav-item"><a class="nav-link active fw-semibold" href="contact.html">Contact Us</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card card-custom p-4 p-md-5">
                    <h2 class="text-center fw-bold mb-2">Send Us Feedback</h2>
                    <p class="text-center text-muted mb-4">Fill out the form below to chat directly with us on WhatsApp!</p>
                    
                    <form id="whatsappForm">
                        <div class="mb-3">
                            <label for="userName" class="form-label fw-semibold">Your Name</label>
                            <input type="text" class="form-control form-control-lg" id="userName" required>
                        </div>

                        <div class="mb-3">
                            <label for="msgSubject" class="form-label fw-semibold">Subject / Item Inquiry</label>
                            <input type="text" class="form-control form-control-lg" id="msgSubject" required>
                        </div>

                        <div class="mb-4">
                            <label for="userMessage" class="form-label fw-semibold">Your Feedback / Message</label>
                            <textarea class="form-control" id="userMessage" rows="4" required></textarea>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-whatsapp btn-lg py-3">
                                <i class="fa-brands fa-whatsapp me-2"></i>Submit via WhatsApp
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer-bg text-white text-center py-3 mt-auto">
        <div class="container">
            <p class="mb-0">&copy; 2026 Treasure Trove Thrift Store. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.getElementById('whatsappForm').addEventListener('submit', function(event) {
            event.preventDefault(); 

            const phoneNumber = "26773214110"; 

            const name = document.getElementById('userName').value.trim();
            const subject = document.getElementById('msgSubject').value.trim();
            const feedback = document.getElementById('userMessage').value.trim();

            const textMessage = `Hello Treasure Trove!%0A%0A` +
                                `*Name:* ${encodeURIComponent(name)}%0A` +
                                `*Subject:* ${encodeURIComponent(subject)}%0A` +
                                `*Feedback:* ${encodeURIComponent(feedback)}`;

            const whatsappUrl = `https://wa.me/${phoneNumber}?text=${textMessage}`;

            window.location.href = whatsappUrl;
        });
    </script>
</body>
</html>
